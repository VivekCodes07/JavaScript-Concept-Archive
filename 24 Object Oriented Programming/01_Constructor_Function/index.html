<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Coder's Bank</title>

  <style>
    * {
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      background-color: #111827;
      color: white;
      max-width: 600px;
      margin: 40px auto;
      padding: 20px;
    }

    h1 {
      text-align: center;
      color: #38bdf8;
      margin-bottom: 30px;
    }

    h2 {
      margin-bottom: 15px;
    }

    form {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-bottom: 25px;
    }

    input {
      padding: 10px;
      border: 1px solid #374151;
      border-radius: 6px;
      background-color: #1f2937;
      color: white;
    }

    input:focus {
      outline: none;
      border-color: #38bdf8;
    }

    button {
      padding: 10px;
      border: none;
      border-radius: 6px;
      background-color: #38bdf8;
      color: #111827;
      font-weight: bold;
      cursor: pointer;
    }

    button:hover {
      opacity: 0.9;
    }

    hr {
      margin: 25px 0;
      border: 1px solid #374151;
    }
  </style>
</head>

<body>
  <h1>🏦 Coder's Bank</h1>

  <!-- Create Account -->
  <h2>Create Account</h2>

  <form id="accountForm">
    <input
      type="text"
      id="customerName"
      placeholder="Enter Customer Name"
      required
    />

    <input
      type="number"
      id="balance"
      placeholder="Initial Balance"
      min="0"
      required
    />

    <button type="submit">Create Account</button>
  </form>

  <hr />

  <!-- Deposit -->
  <h2>Deposit Money</h2>

  <form id="depositForm">
    <input
      type="number"
      id="accountNumber"
      placeholder="Account Number"
      required
    />

    <input
      type="number"
      id="amount"
      placeholder="Deposit Amount"
      min="1"
      required
    />

    <button type="submit">Deposit</button>
  </form>

  <hr />

  <!-- Withdraw -->
  <h2>Withdraw Money</h2>

  <form id="withdrawForm">
    <input
      type="number"
      id="accountNumberToWithdraw"
      placeholder="Account Number"
      required
    />

    <input
      type="number"
      id="amountWithdraw"
      placeholder="Withdraw Amount"
      min="1"
      required
    />

    <button type="submit">Withdraw</button>
  </form>

  <script src="script.js"></script>
</body>
</html>
