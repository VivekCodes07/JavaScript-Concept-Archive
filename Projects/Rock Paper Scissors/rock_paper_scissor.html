<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rock Paper Scissors</title>
  </head>
  <style>
    h1 {
      font-size: 38px;
      color: rgb(0, 252, 252);
      text-shadow: 2px 2px 8px cyan;
      margin-bottom: 10px;
    }
    body {
      background-image: url("https://img.freepik.com/free-vector/modern-business-background-with-digital-technology-design_1361-3299.jpg?semt=ais_hybrid&w=740&q=80");
      background-position: center;
      background-repeat: no-repeat;
      background-size: cover;
      background-attachment: fixed;
      text-align: center;
      color: white;
      background-color: black;
      font-family: Arial, Helvetica, sans-serif;
    }
    div {
      display: flex;
      gap: 10px;
      justify-content: center;
      align-items: center;
    }
    button {
      padding: 8px 32px;
      font-weight: 800;
      margin: 30px;
      background-color: rgba(116, 232, 255, 0.5);
      border-style: none;
      color: rgb(255, 255, 255);
      border-radius: 10px;
      cursor: pointer;
    }

    button:hover {
      transform: scale(1.1);
      box-shadow: 0 0 25px #00ffff, 0 0 40px #00ffff;
    }
    button:active {
      transform: scale(0.95);
      box-shadow: 0 0 10px #0099ff;
    }
    @keyframes pulse {
      0%,
      100% {
        box-shadow: 0 0 15px #00ffcc;
      }
      50% {
        box-shadow: 0 0 30px #00ffff;
      }
    }

    button {
      animation: pulse 7s ease-in-out infinite; /* Apply the animation */
    }
  </style>
  <body>
    <h1>Rock Paper Scissors</h1>
    <div>
      <button value="Rock">Rock</button>
      <button value="Paper">Paper</button>
      <button value="Scissor">Scissor</button>
    </div>
    <h2 id="result"></h2>

    <p></p>

    <script src="script.js"></script>
  </body>
</html>
