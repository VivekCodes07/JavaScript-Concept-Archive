<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Guess The Flip</title>
    <style>
      body {
        color: white;
        background-color: rgb(41, 93, 41);
        margin: 40px;
        text-align: center;
      }

      button {
        padding: 8px 30px;
        font-weight: 600;
        background-color: rgb(7, 229, 51);
        cursor: pointer;
        border-radius: 10px;
      }

      h3 {
        font-size: 66px;
      }
    </style>
  </head>
  <body>
    <h1>Coin-Flip Game</h1>

    <h3>Guess The Flip</h3>
    <button
      onclick="

    let computerMove = '';
    let randomNumber = Math.random();

    if (randomNumber >= 0.3) {
        computerMove = 'Heads';
    } else {
        computerMove ='Tails';
    }

    let result = '';
    const playerMove = 'Heads';
    if (computerMove === playerMove) {
        result = 'You Win 🏆';
    } else {
        result = 'You Lost 😭';
    }

    alert(`You guessed Heads. Flip was ${computerMove}. ${result}`);
    "
    >
      Heads
    </button>
    <button
      onclick="

    let computerMove = '';
    let randomNumber = Math.random();

    if (randomNumber >= 0.3) {
        computerMove = 'Heads';
    } else {
        computerMove ='Tails';
    }

    let result = '';
    const playerMove = 'Tails';
    if (computerMove === playerMove) {
        result = 'You Win 🏆';
    } else {
        result = 'You Lost 😭';
    }

    alert(`You guessed Tails. Flip was ${computerMove}. ${result}`);
    "
    >
      Tails
    </button>
    <script></script>
  </body>
</html>
